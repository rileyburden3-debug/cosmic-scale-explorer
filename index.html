<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Scale Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #02020a;
    --accent: #4af0ff;
    --accent2: #ff6b35;
    --accent3: #c084fc;
    --gold: #fbbf24;
    --text: #e2e8f0;
    --dim: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(1px 1px at 8% 12%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 38%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 18%, rgba(255,255,255,.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 68% 62%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 83% 9%,  rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 17% 78%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 43% 68%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 91% 43%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 59% 88%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at  4% 53%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 34% 29%, rgba(255,255,255,.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 74% 74%, rgba(200,220,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 52%  4%, rgba(200,220,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 93% 55%, rgba(255,240,200,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at  2% 90%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 36% 55%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 77% 32%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 61% 47%, rgba(200,220,255,.3) 0%, transparent 100%);
  }

  header {
    position:relative; z-index:10; text-align:center;
    padding:28px 20px 16px;
    border-bottom:1px solid rgba(74,240,255,.15);
  }
  header h1 {
    font-family:'Orbitron',sans-serif;
    font-size:clamp(1.1rem,4vw,2.4rem);
    font-weight:900; letter-spacing:.15em;
    background:linear-gradient(135deg,var(--accent) 0%,var(--accent3) 50%,var(--accent2) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:6px;
  }
  header p { color:var(--dim); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; }

  /* ── TABS ── */
  .main-tabs {
    position:relative; z-index:10;
    display:flex; gap:0; justify-content:center;
    padding:14px 20px 0; flex-wrap:wrap;
  }
  .main-tab {
    font-family:'Orbitron',sans-serif; font-size:.58rem; letter-spacing:.1em;
    padding:8px 16px; border:1px solid rgba(74,240,255,.2);
    background:rgba(74,240,255,.03); color:var(--dim);
    cursor:pointer; text-transform:uppercase; transition:all .2s;
    margin:2px;
    border-radius:3px;
  }
  .main-tab.active, .main-tab:hover {
    border-color:var(--accent); color:var(--accent); background:rgba(74,240,255,.1);
  }

  /* ── PICKER ── */
  .picker {
    position:relative; z-index:10;
    display:flex; flex-wrap:wrap; gap:10px;
    justify-content:center; align-items:flex-end;
    padding:14px 20px 8px;
  }
  .pick-group { display:flex; flex-direction:column; gap:5px; align-items:center; }
  .pick-group label { font-size:.55rem; letter-spacing:.15em; color:var(--dim); text-transform:uppercase; }
  .pick-group select {
    font-family:'Space Mono',monospace; font-size:.65rem;
    background:rgba(10,10,31,.97); color:var(--text);
    border:1px solid rgba(74,240,255,.35);
    padding:7px 10px; cursor:pointer; outline:none;
    min-width:210px; border-radius:3px;
  }
  .pick-group select:focus { border-color:var(--accent); }
  .compare-btn {
    font-family:'Orbitron',sans-serif; font-size:.62rem; letter-spacing:.12em;
    padding:9px 20px; border:1px solid var(--accent);
    background:rgba(74,240,255,.1); color:var(--accent);
    cursor:pointer; border-radius:3px; text-transform:uppercase;
    transition:all .2s; margin-bottom:1px;
  }
  .compare-btn:hover { background:rgba(74,240,255,.2); box-shadow:0 0 14px rgba(74,240,255,.3); }

  /* ── SCALE VIEW ── */
  .scale-wrap { position:relative; z-index:5; padding:14px 0 0; }
  .scale-label {
    text-align:center; font-size:.56rem; letter-spacing:.1em;
    color:var(--dim); text-transform:uppercase; margin-bottom:10px; padding:0 16px;
    line-height:1.6;
  }
  .canvas-scroll {
    overflow-x:auto; overflow-y:hidden; width:100%; padding:0 20px 14px;
    scrollbar-color:rgba(74,240,255,.4) rgba(255,255,255,.05); scrollbar-width:thin;
  }
  .canvas-scroll::-webkit-scrollbar { height:6px; }
  .canvas-scroll::-webkit-scrollbar-track { background:rgba(255,255,255,.05); }
  .canvas-scroll::-webkit-scrollbar-thumb { background:rgba(74,240,255,.4); border-radius:3px; }
  .canvas-inner { display:flex; align-items:flex-end; gap:0; min-height:200px; }
  .obj-col {
    display:flex; flex-direction:column; align-items:center;
    justify-content:flex-end; flex-shrink:0; padding:0 14px 10px;
  }
  .obj-sphere { border-radius:50%; flex-shrink:0; }
  .obj-col-label { margin-top:9px; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .obj-col-name {
    font-family:'Orbitron',sans-serif; font-size:.55rem;
    letter-spacing:.07em; color:var(--text); text-align:center; max-width:90px; line-height:1.4;
  }
  .obj-col-type { font-size:.48rem; letter-spacing:.1em; text-transform:uppercase; text-align:center; }
  .speak-btn {
    margin-top:3px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2);
    border-radius:50%; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:12px; transition:all .2s; flex-shrink:0;
  }
  .speak-btn:hover { background:rgba(74,240,255,.25); border-color:var(--accent); }

  /* ── CMP PANEL ── */
  .cmp-panel {
    position:relative; z-index:10;
    max-width:860px; margin:14px auto 20px;
    background:rgba(5,5,20,.92);
    border:1px solid rgba(74,240,255,.15);
    border-radius:6px; padding:20px 24px; display:none;
  }
  .cmp-panel.visible { display:block; }
  .cmp-header { font-family:'Orbitron',sans-serif; font-size:.58rem; letter-spacing:.2em; color:var(--accent); text-transform:uppercase; margin-bottom:14px; }
  .cmp-objects { display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap; margin-bottom:16px; }
  .cmp-obj { display:flex; flex-direction:column; align-items:center; gap:7px; flex:0 0 auto; }
  .cmp-sphere { border-radius:50%; flex-shrink:0; }
  .cmp-name { font-family:'Orbitron',sans-serif; font-size:.62rem; letter-spacing:.08em; text-align:center; }
  .cmp-stat { font-size:.58rem; color:var(--dim); text-align:center; }
  .cmp-vs { font-family:'Orbitron',sans-serif; font-size:1rem; color:rgba(74,240,255,.35); font-weight:900; flex-shrink:0; }
  .cmp-ratio { font-size:.85rem; color:var(--gold); font-weight:700; text-align:center; margin-bottom:10px; }
  .cmp-desc { font-size:.66rem; color:var(--dim); line-height:1.9; }
  .cmp-desc strong { color:var(--text); }
  .scale-note { font-size:.55rem; color:rgba(74,240,255,.5); text-align:center; margin-top:10px; letter-spacing:.07em; }
  .share-row {
    display:flex; align-items:center; justify-content:flex-end;
    border-top:1px solid rgba(74,240,255,.08); padding-top:12px;
    margin-top:14px; gap:10px;
  }
  .share-label { font-size:.5rem; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); }
  .share-btn {
    font-family:'Orbitron',sans-serif; font-size:.55rem; letter-spacing:.1em;
    padding:7px 14px; border:1px solid rgba(74,240,255,.3);
    background:rgba(74,240,255,.07); color:var(--accent);
    cursor:pointer; border-radius:3px; text-transform:uppercase;
    display:flex; align-items:center; gap:6px; transition:all .2s;
  }
  .share-btn:hover { background:rgba(74,240,255,.18); box-shadow:0 0 12px rgba(74,240,255,.2); }
  .share-btn.copied { border-color:var(--accent); background:rgba(74,240,255,.2); color:#fff; }

  /* ── GRID ── */
  .browser-wrap { position:relative; z-index:10; max-width:900px; margin:0 auto 50px; padding:0 16px; }
  .browser-title { font-family:'Orbitron',sans-serif; font-size:.58rem; letter-spacing:.2em; color:var(--dim); text-transform:uppercase; text-align:center; margin-bottom:12px; }
  .cat-tabs { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-bottom:12px; }
  .cat-tab {
    font-family:'Orbitron',sans-serif; font-size:.54rem; letter-spacing:.08em;
    padding:5px 11px; border:1px solid rgba(74,240,255,.22);
    background:rgba(74,240,255,.03); color:var(--dim);
    cursor:pointer; border-radius:2px; text-transform:uppercase; transition:all .2s;
  }
  .cat-tab.active,.cat-tab:hover { border-color:var(--accent); color:var(--accent); background:rgba(74,240,255,.1); }

  .search-bar {
    width:100%; margin-bottom:12px;
    font-family:'Space Mono',monospace; font-size:.65rem;
    background:rgba(10,10,31,.95); color:var(--text);
    border:1px solid rgba(74,240,255,.2); padding:8px 14px;
    outline:none; border-radius:3px; display:block;
  }
  .search-bar:focus { border-color:var(--accent); }
  .search-bar::placeholder { color:var(--dim); }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(118px,1fr)); gap:8px; }
  .grid-card {
    background:rgba(10,10,30,.85); border:1px solid rgba(255,255,255,.07);
    border-radius:5px; padding:10px 8px;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    cursor:pointer; transition:all .2s; text-align:center;
  }
  .grid-card:hover { border-color:rgba(74,240,255,.4); background:rgba(74,240,255,.06); }
  .grid-card.sel-a { border-color:var(--accent); box-shadow:0 0 8px rgba(74,240,255,.3); }
  .grid-card.sel-b { border-color:var(--accent2); box-shadow:0 0 8px rgba(255,107,53,.3); }
  .grid-bubble { border-radius:50%; flex-shrink:0; }
  .grid-name { font-family:'Orbitron',sans-serif; font-size:.5rem; letter-spacing:.05em; line-height:1.4; color:var(--text); }
  .grid-type { font-size:.44rem; letter-spacing:.08em; text-transform:uppercase; }
  .grid-speak {
    background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14);
    border-radius:50%; width:24px; height:24px;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; cursor:pointer; transition:all .2s;
  }
  .grid-speak:hover { background:rgba(74,240,255,.2); border-color:var(--accent); }
  .pick-hint { text-align:center; font-size:.55rem; color:var(--dim); letter-spacing:.07em; margin-top:10px; }
  .pick-hint .a { color:var(--accent); } .pick-hint .b { color:var(--accent2); }
  .count-badge { font-size:.52rem; color:var(--dim); text-align:center; margin-bottom:8px; letter-spacing:.05em; }

  @keyframes star-pulse {
    0%,100%{box-shadow:0 0 14px 4px rgba(251,191,36,.5);}
    50%{box-shadow:0 0 32px 10px rgba(251,191,36,.7);}
  }
  @keyframes bh-throb {
    0%,100%{box-shadow:0 0 22px 6px rgba(192,132,252,.5),inset 0 0 14px rgba(0,0,0,.95);}
    50%{box-shadow:0 0 45px 14px rgba(192,132,252,.3),inset 0 0 26px rgba(0,0,0,.99);}
  }
  @keyframes orbit-spin {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }
  @keyframes orbit-spin-rev {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(-360deg); }
  }

  /* ── ORBIT RINGS ── */
  .obj-sphere-wrap, .grid-bubble-wrap, .cmp-sphere-wrap {
    position: relative; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .orbit-ring {
    position:absolute; top:50%; left:50%;
    border-radius:50%; border-style:solid;
    pointer-events:none; opacity:0; transition:opacity .3s;
  }
  .obj-sphere-wrap:hover .orbit-ring,
  .grid-card:hover .orbit-ring,
  .cmp-obj:hover .orbit-ring { opacity:1; }

  /* ── RELATABLE FACTS ── */
  .relatable-box {
    margin-top:14px; padding:12px 16px;
    background:rgba(74,240,255,.05); border:1px solid rgba(74,240,255,.18);
    border-radius:5px;
  }
  .relatable-header {
    font-family:'Orbitron',sans-serif; font-size:.52rem; letter-spacing:.18em;
    color:var(--accent); text-transform:uppercase; margin-bottom:10px;
  }
  .relatable-item {
    font-size:.64rem; color:var(--dim); line-height:1.8; padding:3px 0;
    border-bottom:1px solid rgba(255,255,255,.04);
  }
  .relatable-item:last-child { border-bottom:none; }
  .relatable-item strong { color:var(--gold); }
</style>
</head>
<body>

<header>
  <h1>COSMIC SCALE EXPLORER</h1>
  <p>70+ space objects — true scale comparison from dust to supermassive black holes</p>
</header>

<div class="picker">
  <div class="pick-group">
    <label>Object A</label>
    <select id="selA"></select>
  </div>
  <button class="compare-btn" onclick="runCompare()">Compare ▶</button>
  <div class="pick-group">
    <label>Object B</label>
    <select id="selB"></select>
  </div>
</div>

<div class="scale-wrap">
  <p class="scale-label" id="scaleLabel">Select two objects and click Compare</p>
  <div class="canvas-scroll">
    <div class="canvas-inner" id="canvasInner"></div>
  </div>
</div>

<div class="cmp-panel" id="cmpPanel">
  <div class="cmp-header">⬡ Scale Comparison</div>
  <div class="cmp-objects" id="cmpObjects"></div>
  <div class="cmp-ratio" id="cmpRatio"></div>
  <div class="cmp-desc" id="cmpDesc"></div>
  <div class="scale-note" id="scaleNote"></div>
  <div class="share-row">
    <span class="share-label">Share this comparison</span>
    <button class="share-btn" id="shareBtn" onclick="copyShareLink()">🔗 Copy Link</button>
  </div>
</div>

<div class="browser-wrap">
  <div class="browser-title">Browse All Objects</div>
  <div class="cat-tabs" id="catTabs"></div>
  <input class="search-bar" id="searchBar" placeholder="🔍  Search objects…" oninput="renderGrid()">
  <div class="count-badge" id="countBadge"></div>
  <div class="grid" id="objectGrid"></div>
  <p class="pick-hint">Tap → <span class="a">Object A</span> &nbsp;|&nbsp; Tap another → <span class="b">Object B</span> &nbsp;|&nbsp; Then Compare</p>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA  — rKm = mean radius in km
// ═══════════════════════════════════════════════════════
const OBJECTS = [

  // ── ASTEROIDS / SMALL SOLAR SYSTEM BODIES ───────────
  {id:'ryugu',      name:'Ryugu',           pron:'ree-YOO-goo',           type:'asteroid',  rKm:0.45,       color:'#5a5a5a', desc:'A diamond-shaped near-Earth asteroid visited by Japan\'s Hayabusa2 mission in 2018.'},
  {id:'bennu',      name:'Bennu',           pron:'BEN-oo',                type:'asteroid',  rKm:0.245,      color:'#6a6060', desc:'A rubble-pile asteroid sampled by NASA\'s OSIRIS-REx mission. Slightly higher impact risk for Earth in 2182.'},
  {id:'itokawa',    name:'Itokawa',         pron:'ee-toh-KAH-wah',        type:'asteroid',  rKm:0.165,      color:'#7a7060', desc:'A peanut-shaped asteroid — the first to have samples returned to Earth, by Japan\'s Hayabusa mission.'},
  {id:'mathilde',   name:'Mathilde',        pron:'mah-TILD',              type:'asteroid',  rKm:26.5,       color:'#4a4a4a', desc:'A C-type asteroid in the main belt with an unusually low density, suggesting it\'s largely hollow.'},
  {id:'lutetia',    name:'Lutetia',         pron:'loo-TEE-shah',          type:'asteroid',  rKm:49,         color:'#5a5060', desc:'A large main-belt asteroid with an ancient, cratered surface, imaged up close by ESA\'s Rosetta.'},
  {id:'ida',        name:'Ida',             pron:'EYE-dah',               type:'asteroid',  rKm:15.7,       color:'#6a6060', desc:'A main-belt asteroid famous for having its own tiny moon, Dactyl, discovered during Galileo\'s flyby.'},
  {id:'vesta',      name:'Vesta',           pron:'VES-tah',               type:'asteroid',  rKm:262.7,      color:'#9a9080', desc:'The second-largest body in the asteroid belt, with a giant crater at its south pole. Has its own family of meteorites.'},
  {id:'pallas',     name:'Pallas',          pron:'PAL-us',                type:'asteroid',  rKm:256,        color:'#8a8878', desc:'One of the largest asteroids, with a highly tilted orbit — the most inclined of any major solar system body.'},
  {id:'hygiea',     name:'Hygiea',          pron:'hi-JEE-ah',             type:'asteroid',  rKm:217,        color:'#7a7870', desc:'The fourth-largest asteroid and possibly a dwarf planet — nearly spherical and very dark in color.'},

  // ── COMETS ───────────────────────────────────────────
  {id:'churyumov',  name:'67P / C-G',       pron:'67P Churyumov Gerasimenko', type:'comet', rKm:2.0,       color:'#4a4a40', desc:'The rubber-duck-shaped comet explored by ESA\'s Rosetta mission, which landed Philae on its surface in 2014.'},
  {id:'halley',     name:"Halley's Comet",  pron:"HAL-eez comet",         type:'comet',     rKm:5.5,        color:'#555548', desc:'The most famous comet of all — visible from Earth every ~75 years. Last seen in 1986, returns in 2061.'},
  {id:'hale_bopp',  name:'Hale-Bopp',       pron:'HAYL BOP',              type:'comet',     rKm:30,         color:'#606055', desc:'One of the brightest comets of the 20th century, visible to the naked eye for 18 months in 1996–1997.'},

  // ── DWARF PLANETS ────────────────────────────────────
  {id:'ceres',      name:'Ceres',           pron:'SEER-eez',              type:'dwarf',     rKm:469.7,      color:'#888880', desc:'The only dwarf planet in the inner solar system, in the asteroid belt. Has bright salt deposits in its craters.'},
  {id:'pluto',      name:'Pluto',           pron:'PLOO-toh',              type:'dwarf',     rKm:1188,       color:'#c8a88a', desc:'The most famous dwarf planet — with a heart-shaped nitrogen ice plain called Tombaugh Regio.'},
  {id:'eris',       name:'Eris',            pron:'EE-ris',                type:'dwarf',     rKm:1163,       color:'#c0c0c8', desc:'The most massive dwarf planet, and the reason Pluto was reclassified. Has a tiny moon called Dysnomia.'},
  {id:'makemake',   name:'Makemake',        pron:'MAH-keh MAH-keh',       type:'dwarf',     rKm:715,        color:'#c89070', desc:'A bright reddish dwarf planet in the Kuiper Belt, named after the creator deity of the Rapa Nui people.'},
  {id:'haumea',     name:'Haumea',          pron:'how-MAY-ah',            type:'dwarf',     rKm:620,        color:'#d8d0c0', desc:'An egg-shaped dwarf planet that spins so fast (once every 4 hours) it has been squashed into an oval.'},
  {id:'quaoar',     name:'Quaoar',          pron:'KWAH-oh-ar',            type:'dwarf',     rKm:555,        color:'#a09080', desc:'A Kuiper Belt dwarf planet with a dense ring system discovered in 2022 — further out than any known ring.'},
  {id:'sedna',      name:'Sedna',           pron:'SED-nah',               type:'dwarf',     rKm:497,        color:'#c86050', desc:'A dark red dwarf planet with the most distant known orbit in the solar system — takes 11,000 years to go around the Sun.'},
  {id:'gonggong',   name:'Gonggong',        pron:'GONG-gong',             type:'dwarf',     rKm:615,        color:'#b06868', desc:'A large, reddish dwarf planet in the scattered disc named after a Chinese water god.'},
  {id:'orcus',      name:'Orcus',           pron:'OR-kus',                type:'dwarf',     rKm:458,        color:'#909090', desc:'A plutino — a Kuiper Belt object that orbits in a 2:3 resonance with Neptune, just like Pluto.'},

  // ── MOONS ────────────────────────────────────────────
  {id:'phobos',     name:'Phobos',          pron:'FOH-boss',              type:'moon',      rKm:11.2,       color:'#7a8a9a', desc:"Mars's tiny potato-shaped inner moon. It orbits so fast it rises in the west and sets in the east!"},
  {id:'deimos',     name:'Deimos',          pron:'DAY-moss',              type:'moon',      rKm:6.2,        color:'#8a9aaa', desc:"Mars's smaller outer moon — so small it looks like a star from the Martian surface."},
  {id:'moon',       name:"Earth's Moon",    pron:"Earths Moon",           type:'moon',      rKm:1737,       color:'#94a3b8', desc:'Our familiar Moon — the fifth-largest in the solar system. The only other world humans have walked on.'},
  {id:'io',         name:'Io',              pron:'EYE-oh',                type:'moon',      rKm:1821,       color:'#e8c840', desc:"Jupiter's innermost large moon — the most volcanically active body in the solar system."},
  {id:'europa',     name:'Europa',          pron:'yoo-ROH-pah',           type:'moon',      rKm:1560,       color:'#b0c4de', desc:"Jupiter's icy moon, thought to hide a vast liquid water ocean beneath its cracked crust."},

  exoplanet:'#34d399', blackhole:'#c084fc'

function typeColor(t) { return TYPE_COLORS[t]||'#fff'; }

function formatR(km) {
  if (km>=1e9) return (km/1e9).toFixed(2)+' billion km';
  if (km>=1e6) return (km/1e6).toFixed(2)+' million km';
  if (km>=1000) return Math.round(km).toLocaleString()+' km';
  if (km>=1)    return km.toFixed(2)+' km';
  return (km*1000).toFixed(1)+' m';
}

// ═══════════════════════════════════════════════════════
//  ORBIT RINGS
// ═══════════════════════════════════════════════════════
function orbitRingsHTML(obj, px) {
  if (!['planet','moon','dwarf','exoplanet'].includes(obj.type)) return '';
  const configs = {
    planet:   [{scale:1.55,color:'rgba(74,240,255,.55)',  w:1.5, dur:7,  rev:false},
                {scale:1.85,color:'rgba(192,132,252,.35)',w:1,   dur:13, rev:true}],
    moon:     [{scale:1.6, color:'rgba(148,163,184,.5)',  w:1,   dur:9,  rev:false}],
    dwarf:    [{scale:1.5, color:'rgba(96,176,192,.45)',  w:1,   dur:11, rev:false}],
    exoplanet:[{scale:1.6, color:'rgba(52,211,153,.5)',   w:1.5, dur:8,  rev:false},
                {scale:2.0, color:'rgba(52,211,153,.2)',  w:1,   dur:15, rev:true}],
  };
  const rings = configs[obj.type] || [];
  // Use a fixed display size for rings to keep them visible regardless of sphere px
  const base = Math.min(Math.max(px, 30), 120);
  return rings.map(r => {
    const d = base * r.scale;
    const anim = r.rev ? 'orbit-spin-rev' : 'orbit-spin';
    return `<div class="orbit-ring" style="
      width:${d}px;height:${d}px;
      border:${r.w}px solid ${r.color};
      animation:${anim} ${r.dur}s linear infinite;
    "></div>`;
  }).join('');
}

// wrap a sphere div + rings in a positioning wrapper
function sphereWithRings(obj, px, anim=true) {
  const base = Math.min(Math.max(px, 30), 120);
  const rings = orbitRingsHTML(obj, base);
  const extraPad = rings ? Math.ceil(base * 1.1) : 0;
  const wrapSize = px + extraPad;
  return `<div class="obj-sphere-wrap" style="width:${Math.max(px,wrapSize)}px;height:${Math.max(px,wrapSize)}px;">
    <div class="obj-sphere" style="${sphereCSS(obj,px,anim)}"></div>
    ${rings}
  </div>`;
}

// ═══════════════════════════════════════════════════════
//  RELATABLE SIZE FACTS
// ═══════════════════════════════════════════════════════
const LANDMARKS = [
  {name:'a human hair width',      km:0.00007},
  {name:'a grain of sand',         km:0.0005},
  {name:'a football field length', km:0.1},
  {name:'Mt. Everest height',      km:8.849},
  {name:'the English Channel',     km:560},
  {name:'the diameter of Earth',   km:12742},
  {name:'the Moon\'s diameter',    km:3474},
  {name:'the distance Earth–Moon', km:384400},
  {name:'the distance Earth–Sun',  km:149600000},
];

function relatableFacts(oA, oB) {
  const larger  = oA.rKm >= oB.rKm ? oA : oB;
  const smaller = oA.rKm <  oB.rKm ? oA : oB;
  const largeD  = larger.rKm  * 2;
  const smallD  = smaller.rKm * 2;
  const facts   = [];

  // How many of landmark fit across the larger object?
  LANDMARKS.forEach(lm => {
    const n = largeD / lm.km;
    if (n >= 1.5 && n < 1e15) {
      const nf = n >= 1e9 ? (n/1e9).toFixed(1)+' billion'
               : n >= 1e6 ? (n/1e6).toFixed(1)+' million'
               : n >= 1000 ? Math.round(n/1000).toLocaleString()+'k'
               : Math.round(n).toLocaleString();
      facts.push(`<span class="relatable-item">📏 <strong>${larger.name}</strong>'s diameter spans roughly <strong>${nf} × ${lm.name}</strong>.</span>`);
    }
  });

  // How many of the smaller fit across the larger (diameter)?
  const lineCount = largeD / smallD;
  if (lineCount >= 2) {
    const lf = lineCount >= 1e6 ? (lineCount/1e6).toFixed(1)+' million'
             : lineCount >= 1000 ? Math.round(lineCount).toLocaleString()
             : lineCount.toFixed(1);
    facts.push(`<span class="relatable-item">🔢 You could line up roughly <strong>${lf} copies</strong> of <strong>${smaller.name}</strong> across <strong>${larger.name}</strong>'s diameter.</span>`);
  }

  // Light travel time across the larger object
  const lightSec = largeD / 299792;
  if (lightSec >= 0.001) {
    const lt = lightSec >= 3600 ? (lightSec/3600).toFixed(2)+' hours'
             : lightSec >= 60   ? (lightSec/60).toFixed(1)+' minutes'
             : lightSec >= 1    ? lightSec.toFixed(2)+' seconds'
             : (lightSec*1000).toFixed(1)+' milliseconds';
    facts.push(`<span class="relatable-item">⚡ Light takes about <strong>${lt}</strong> to travel across <strong>${larger.name}</strong>.</span>`);
  }

  // Surface area comparison
  const saRatio = (larger.rKm / smaller.rKm) ** 2;
  if (saRatio >= 4) {
    const sf = saRatio >= 1e6 ? (saRatio/1e6).toFixed(1)+' million'
             : saRatio >= 1000 ? Math.round(saRatio).toLocaleString()
             : saRatio.toFixed(1);
    facts.push(`<span class="relatable-item">🌐 <strong>${larger.name}</strong>'s surface area is about <strong>${sf}×</strong> that of <strong>${smaller.name}</strong>.</span>`);
  }

  return facts.slice(0,4); // cap at 4 facts
}

function sphereCSS(obj, px, anim=true) {
  const s=`width:${px}px;height:${px}px;`;
  if (obj.type==='blackhole')
    return s+`background:radial-gradient(circle at 35% 35%,#1a0030 0%,#0a0010 50%,#000 100%);`+(anim?'animation:bh-throb 3s ease-in-out infinite;':'');
  if (obj.type==='star')
    return s+`background:radial-gradient(circle at 35% 35%,#fffde7,${obj.color} 55%,${obj.color}88 100%);`+(anim?'animation:star-pulse 2.5s ease-in-out infinite;':'');
  if (obj.type==='comet')
    return s+`background:radial-gradient(circle at 40% 40%,#e8e8d8,${obj.color} 65%,${obj.color}66 100%);box-shadow:0 0 10px 2px rgba(200,200,160,.3);`;
  return s+`background:radial-gradient(circle at 35% 35%,${obj.color}cc,${obj.color} 60%,${obj.color}44 100%);box-shadow:0 0 14px 3px ${obj.color}33;`;
}

// ═══════════════════════════════════════════════════════
//  SPEECH
// ═══════════════════════════════════════════════════════
function speak(text, e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  if (!window.speechSynthesis) { alert('Audio not supported in this browser.'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 1.05;
  window.speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════════════
//  TRUE-SCALE VIEW
// ═══════════════════════════════════════════════════════
const MAX_PX = 1100, MIN_PX = 4;

function buildScaleView(oA, oB) {
  const inner = document.getElementById('canvasInner');
  const label = document.getElementById('scaleLabel');
  inner.innerHTML = '';

  const maxR = Math.max(oA.rKm, oB.rKm);
  const minR = Math.min(oA.rKm, oB.rKm);
  const scale = MAX_PX / (maxR * 2);
  const tooSmall = (minR * 2 * scale) < MIN_PX;

  inner.style.minHeight = (MAX_PX + 130) + 'px';

  [oA, oB].forEach(obj => {
    const rawPx = obj.rKm * 2 * scale;
    const px = Math.max(rawPx, MIN_PX);
    const col = document.createElement('div');
    col.className = 'obj-col';
    col.style.minWidth = Math.max(px + 24, 100) + 'px';
    col.innerHTML = `
      ${sphereWithRings(obj,px,true)}
      <div class="obj-col-label">
        <div class="obj-col-name">${obj.name}</div>
        <div class="obj-col-type" style="color:${typeColor(obj.type)}">${obj.type}</div>
        <div class="speak-btn" onclick="speak('${obj.pron}',event)" title="Hear name">🔊</div>
      </div>`;
    inner.appendChild(col);
  });

  const smaller = oA.rKm < oB.rKm ? oA : oB;
  if (tooSmall) {
    label.innerHTML = `⚠ <strong style="color:var(--accent2)">${smaller.name}</strong> would be invisible at true scale (shown as ${MIN_PX}px). That's how extreme this size difference really is!`;
  } else {
    label.textContent = '↔ Both objects at identical true scale — scroll right if needed';
  }
}

// ═══════════════════════════════════════════════════════
//  COMPARE
// ═══════════════════════════════════════════════════════
function runCompare() {
  const idA = document.getElementById('selA').value;
  const idB = document.getElementById('selB').value;
  const oA = OBJECTS.find(o=>o.id===idA);
  const oB = OBJECTS.find(o=>o.id===idB);
  if (!oA||!oB) return;
  const url = new URL(window.location.href);
  url.searchParams.set('a', idA);
  url.searchParams.set('b', idB);
  window.history.replaceState({}, '', url);

  buildScaleView(oA, oB);

  const panel = document.getElementById('cmpPanel');
  panel.classList.add('visible');

  const ratio = Math.max(oA.rKm,oB.rKm) / Math.min(oA.rKm,oB.rKm);
  const larger = oA.rKm>=oB.rKm?oA:oB;
  const smaller = oA.rKm<oB.rKm?oA:oB;

  // Log-scale bubbles in info panel
  const MAX_CMP=120, MIN_CMP=12;
  const lA=Math.log10(Math.max(oA.rKm,0.001)), lB=Math.log10(Math.max(oB.rKm,0.001));
  const lMin=Math.min(lA,lB), lR=Math.max(Math.abs(lA-lB),0.5);
  const sA=MIN_CMP+((lA-lMin)/lR)*(MAX_CMP-MIN_CMP);
  const sB=MIN_CMP+((lB-lMin)/lR)*(MAX_CMP-MIN_CMP);

  document.getElementById('cmpObjects').innerHTML = `
    <div class="cmp-obj">
      ${sphereWithRings(oA, Math.max(sA,MIN_CMP), true)}
      <div class="cmp-name">${oA.name}</div>
      <div class="cmp-stat">${formatR(oA.rKm)} radius</div>
      <div class="speak-btn" style="margin-top:5px" onclick="speak('${oA.pron}',event)">🔊</div>
    </div>
    <div class="cmp-vs">VS</div>
    <div class="cmp-obj">
      ${sphereWithRings(oB, Math.max(sB,MIN_CMP), true)}
      <div class="cmp-name">${oB.name}</div>
      <div class="cmp-stat">${formatR(oB.rKm)} radius</div>
      <div class="speak-btn" style="margin-top:5px" onclick="speak('${oB.pron}',event)">🔊</div>
    </div>`;

  const rf = r => r>=1e12?(r/1e12).toFixed(1)+' trillion':
                  r>=1e9?(r/1e9).toFixed(1)+' billion':
                  r>=1e6?(r/1e6).toFixed(1)+' million':
                  r>=1000?Math.round(r/1000).toLocaleString()+',000':
                  r.toFixed(1);

  document.getElementById('cmpRatio').textContent =
    `${larger.name} is ${rf(ratio)}× larger than ${smaller.name}`;

  let extra='';
  if (ratio > 100) {
    const vol = ratio**3;
    const vf = vol>1e18?(vol/1e18).toFixed(1)+' quintillion':
               vol>1e15?(vol/1e15).toFixed(0)+' quadrillion':
               vol>1e12?(vol/1e12).toFixed(0)+' trillion':
               vol>1e9?(vol/1e9).toFixed(0)+' billion':
               vol>1e6?(vol/1e6).toFixed(0)+' million':
               Math.round(vol).toLocaleString();
    extra=`<br><br><span style="color:var(--accent)">🤯 Mind-bender:</span> About <strong style="color:var(--gold)">${vf}</strong> copies of ${smaller.name} could fit inside ${larger.name} by volume!`;
  }

  document.getElementById('cmpDesc').innerHTML =
    `<strong>${oA.name}:</strong> ${oA.desc}<br><br><strong>${oB.name}:</strong> ${oB.desc}${extra}`;

  // Relatable facts
  const facts = relatableFacts(oA, oB);
  const existingBox = document.getElementById('relatableBox');
  if (existingBox) existingBox.remove();
  if (facts.length) {
    const box = document.createElement('div');
    box.id = 'relatableBox';
    box.className = 'relatable-box';
    box.innerHTML = `<div class="relatable-header">📐 Put it in perspective</div>${facts.join('')}`;
    document.getElementById('cmpPanel').appendChild(box);
  }

  document.getElementById('scaleNote').textContent =
    ratio > 200
    ? '⚠ True-scale view above: the smaller object may appear as a tiny dot — that\'s how extreme this really is!'
    : 'True-scale view above shows both objects at the same pixels-per-km.';

  panel.scrollIntoView({behavior:'smooth', block:'start'});
}

// ═══════════════════════════════════════════════════════
//  GRID
// ═══════════════════════════════════════════════════════
let gridFilter='all', gridSelA=null, gridSelB=null;

function buildCatTabs() {
  const wrap = document.getElementById('catTabs');
  wrap.innerHTML='';
  CATEGORIES.forEach(cat => {
    const d = document.createElement('div');
    d.className='cat-tab'+(cat.id==='all'?' active':'');
    d.textContent=`${cat.emoji} ${cat.label}`;
    d.onclick=()=>{ gridFilter=cat.id; document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active')); d.classList.add('active'); renderGrid(); };
    wrap.appendChild(d);
  });
}

function renderGrid() {
  const search = document.getElementById('searchBar').value.toLowerCase().trim();
  const list = OBJECTS.filter(o=>{
    const catOk = gridFilter==='all' || o.type===gridFilter;
    const searchOk = !search || o.name.toLowerCase().includes(search) || o.type.toLowerCase().includes(search);
    return catOk && searchOk;
  });

  document.getElementById('countBadge').textContent = `${list.length} object${list.length!==1?'s':''} shown`;

  const grid = document.getElementById('objectGrid');
  grid.innerHTML='';

  if (list.length===0) {
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--dim);font-size:.65rem;padding:30px">No objects match your search.</div>';
    return;
  }

  const logs = list.map(o=>Math.log10(Math.max(o.rKm,0.001)));
  const lMin=Math.min(...logs), lMax=Math.max(...logs), lR=lMax-lMin||1;

  list.forEach(obj=>{
    const lv=Math.log10(Math.max(obj.rKm,0.001));
    const sz=10+((lv-lMin)/lR)*44;
    const card=document.createElement('div');
    card.className='grid-card'+(gridSelA===obj.id?' sel-a':gridSelB===obj.id?' sel-b':'');
    const bsz = Math.max(sz,8);
    card.innerHTML=`
      <div class="grid-bubble-wrap" style="width:${bsz+40}px;height:${bsz+40}px;">
        <div class="grid-bubble" style="${sphereCSS(obj,bsz,false)}"></div>
        ${orbitRingsHTML(obj, bsz)}
      </div>
      <div class="grid-name">${obj.name}</div>
      <div class="grid-type" style="color:${typeColor(obj.type)}">${obj.type}</div>
      <div class="grid-speak" onclick="speak('${obj.pron}',event)">🔊</div>`;
    card.addEventListener('click',()=>selectCard(obj.id));
    grid.appendChild(card);
  });
}

function selectCard(id) {
  if (!gridSelA||(gridSelA&&gridSelB)) {
    gridSelA=id; gridSelB=null;
    document.getElementById('selA').value=id;
  } else if (gridSelA&&!gridSelB&&id!==gridSelA) {
    gridSelB=id;
    document.getElementById('selB').value=id;
    runCompare();
  }
  renderGrid();
}

// ═══════════════════════════════════════════════════════
//  SELECTS + INIT
// ═══════════════════════════════════════════════════════
function buildSelects() {
  // Group by type for easier browsing
  const order = ['asteroid','comet','dwarf','moon','planet','star','exoplanet','blackhole'];
  const grouped = {};
  order.forEach(t=>{ grouped[t]=[]; });
  OBJECTS.forEach(o=>{ if(grouped[o.type]) grouped[o.type].push(o); });

  ['selA','selB'].forEach((sid,i)=>{
    const sel=document.getElementById(sid);
    sel.innerHTML='';
    order.forEach(type=>{
      if (!grouped[type].length) return;
      const og=document.createElement('optgroup');
      og.label=type.charAt(0).toUpperCase()+type.slice(1)+'s';
      grouped[type].forEach(o=>{
        const opt=document.createElement('option');
        opt.value=o.id; opt.textContent=o.name;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
    sel.value = i===0?'earth':'betelgeuse';
  });
}

// ═══════════════════════════════════════════════════════
//  SHARE
// ═══════════════════════════════════════════════════════
function copyShareLink() {
  const btn = document.getElementById('shareBtn');
  navigator.clipboard.writeText(window.location.href).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '🔗 Copy Link';
      btn.classList.remove('copied');
    }, 2000);
  });
}

buildSelects();
buildCatTabs();
renderGrid();

// Load shared URL params if present, otherwise run default compare
const _params = new URLSearchParams(window.location.search);
const _pA = _params.get('a'), _pB = _params.get('b');
if (_pA && _pB && OBJECTS.find(o=>o.id===_pA) && OBJECTS.find(o=>o.id===_pB)) {
  document.getElementById('selA').value = _pA;
  document.getElementById('selB').value = _pB;
  setTimeout(runCompare, 150);
} else {
  setTimeout(runCompare, 150);
}
</script>
</body>
